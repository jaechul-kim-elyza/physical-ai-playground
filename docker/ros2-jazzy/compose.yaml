services:
  ros2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ros2-jazzy
    network_mode: host
    privileged: true

    environment:
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: "1"

    volumes:
      - ../../ros2_ws:/root/ros2_ws
      - /tmp/.X11-unix:/tmp/.X11-unix

    stdin_open: true
    tty: true