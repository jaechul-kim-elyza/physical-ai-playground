ci:
  autofix_prs: true
  autoupdate_schedule: monthly
  autofix_commit_msg: "fix(pre-commit): 🎨 auto format pre-commit hooks"
  autoupdate_commit_msg: "chore(pre-commit): ⬆ pre_commit autoupdate"
  skip: [mypy]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-toml
      - id: check-case-conflict
      - id: check-added-large-files
        args: ["--maxkb=200", "--enforce-all"]
        exclude: uv.lock
      - id: detect-private-key
      - id: pretty-format-json
        args: ["--autofix", "--no-sort-keys", "--indent=4"]
        exclude: \.ipynb$
      - id: end-of-file-fixer
      - id: mixed-line-ending

  - repo: https://github.com/JoC0de/pre-commit-prettier
    rev: v3.9.4 # using tag; previously pinned SHA when tags were not persistent
    hooks:
      - id: prettier
        files: \.(ya?ml|toml)$
        # https://prettier.io/docs/en/options.html#print-width
        args: ["--print-width=120"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: ["--exit-non-zero-on-fix"]
        exclude: ^notebooks/.*\.py$
      - id: ruff-format
        exclude: ^notebooks/.*\.py$

  - repo: https://github.com/PyCQA/docformatter
    rev: v1.7.8
    hooks:
      - id: docformatter
        language_version: python3.10
        additional_dependencies: [tomli]
        args: ["--in-place"]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        # Keep the mypy requirement in pyproject.toml aligned when changing this hook.
        entry: python -m mypy src/rfdetr/ --no-error-summary
        language: system
        pass_filenames: false

  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        exclude: ^docs/reference/
        additional_dependencies:
          - "mdformat-mkdocs[recommended]>=2.1.0"
          - "mdformat-ruff"
        args: ["--number"]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        # args: [--write-changes]
        additional_dependencies:
          - tomli

  #- repo: https://github.com/mwouts/jupytext
  #  rev: v1.16.4
  #  hooks:
  #    - id: jupytext
  #      args: [--update, --to, notebook]
  #      files: ^notebooks/.*\.py$

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: insert-license
        files: \.py$
        exclude: ^notebooks/
        args:
          - --license-filepath
          - .github/LICENSE_HEADER.txt
          - --comment-style
          - "#"
